document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 grid-template-columns: 1fr !important; gap: 6px !important; }\n      .gmil { grid-template-columns: 1fr !important; }\n      .chain-arr { padding-left: 0 !important; }\n\n      .mi { border-right: none !important; border-bottom: 1px solid rgba(26,22,20,0.12) !important; padding: 28px 0 !important; }\n      .mi:first-child { padding-left: 0 !important; }\n      .mi:last-child  { border-bottom: none !important; padding-right: 0 !important; }\n      .mi:nth-child(3n)   { border-right: none !important; }\n      .mi:nth-child(3n+1) { border-right: none !important; }\n      .mi:nth-child(3n+2) { border-right: none !important; }\n\n      .ghost-num { font-size: 80px !important; opacity: 0.1 !important; }\n      .sec-hdr   { padding-top: 64px !important; margin-bottom: 44px !important; }\n      .lvl-inner-pad { padding-top: 36px !important; padding-bottom: 44px !important; }\n      .g2-mb { margin-bottom: 44px !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- ════════════════════════ NAV ════════════════════════ -->\n<nav style=\"position:fixed;top:0;left:0;right:0;z-index:200;height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 56px;background:rgba(23,20,18,0.96);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.05);\">\n\n  <a href=\"#hero\" style=\"display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0;\">\n    <div style=\"display:flex;align-items:flex-end;gap:3px;height:22px;\">\n      <div style=\"width:4px;height:11px;background:#C4271B;\"><\u002Fdiv>\n      <div style=\"width:4px;height:16px;background:#C4271B;\"><\u002Fdiv>\n      <div style=\"width:4px;height:22px;background:#C4271B;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:17px;letter-spacing:0.2em;color:#F0E9DF;text-transform:uppercase;\">Индустрия<\u002Fspan>\n  <\u002Fa>\n\n  <div class=\"nav-links\">\n    <a href=\"#why\" style=\"font-family:'Manrope',sans-serif;font-size:11.5px;font-weight:600;color:#8A8278;text-decoration:none;letter-spacing:0.12em;text-transform:uppercase;\" style-hover=\"color:#F0E9DF;\">О нас<\u002Fa>\n    <a href=\"#levels\" style=\"font-family:'Manrope',sans-serif;font-size:11.5px;font-weight:600;color:#8A8278;text-decoration:none;letter-spacing:0.12em;text-transform:uppercase;\" style-hover=\"color:#F0E9DF;\">Проблема<\u002Fa>\n    <a href=\"#building\" style=\"font-family:'Manrope',sans-serif;font-size:11.5px;font-weight:600;color:#8A8278;text-decoration:none;letter-spacing:0.12em;text-transform:uppercase;\" style-hover=\"color:#F0E9DF;\">Планы<\u002Fa>\n    <a href=\"#rule\" style=\"font-family:'Manrope',sans-serif;font-size:11.5px;font-weight:600;color:#8A8278;text-decoration:none;letter-spacing:0.12em;text-transform:uppercase;\" style-hover=\"color:#F0E9DF;\">Правила<\u002Fa>\n  <\u002Fdiv>\n\n  <a href=\"#rule\" class=\"nav-cta\" style=\"font-family:'Manrope',sans-serif;font-size:11.5px;font-weight:700;color:#F0E9DF;text-decoration:none;letter-spacing:0.14em;text-transform:uppercase;border:1.5px solid rgba(240,233,223,0.42);padding:11px 28px;flex-shrink:0;\" style-hover=\"border-color:#F0E9DF;background:rgba(240,233,223,0.07);\">\n    Вступить\n  <\u002Fa>\n<\u002Fnav>\n\n\n<!-- ════════════════════════ HERO ════════════════════════ -->\n<section id=\"hero\" style=\"min-height:100vh;background:#181614;display:flex;flex-direction:column;justify-content:flex-end;padding:80px 56px 88px;position:relative;overflow:hidden;\">\n\n  <div style=\"position:absolute;inset:0;background-image:linear-gradient(0deg,rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:88px 88px;pointer-events:none;\"><\u002Fdiv>\n\n  <div style=\"position:relative;z-index:1;max-width:1400px;width:100%;\">\n\n    <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:52px;\">\n      <div style=\"width:36px;height:1px;background:#C4271B;flex-shrink:0;\"><\u002Fdiv>\n      <span style=\"font-family:'Manrope',sans-serif;font-size:11.5px;font-weight:700;color:#C4271B;letter-spacing:0.22em;text-transform:uppercase;\">Закрытое профессиональное пространство<\u002Fspan>\n    <\u002Fdiv>\n\n    <h1 style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(60px,14vw,240px);line-height:0.88;color:#F0E9DF;text-transform:uppercase;letter-spacing:-0.01em;\">Индустрия<\u002Fh1>\n    <p style=\"font-family:'Oswald',sans-serif;font-weight:300;font-size:clamp(20px,3.8vw,60px);line-height:1.1;color:rgba(240,233,223,0.38);text-transform:uppercase;letter-spacing:0.04em;margin-top:10px;\">Профессионального консалтинга<\u002Fp>\n\n    <div style=\"width:100%;height:1px;background:rgba(240,233,223,0.09);margin:48px 0;\"><\u002Fdiv>\n\n    <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:32px;flex-wrap:wrap;\">\n      <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(15px,1.3vw,18px);line-height:1.7;color:#908880;max-width:580px;text-wrap:pretty;\">\n        Вы попали в закрытое профессиональное пространство, созданное с единой целью — объединить опытных экспертов, консультантов, стратегических партнёров и советников для перехода на новый уровень масштаба.\n      <\u002Fp>\n      <a href=\"#why\" style=\"flex-shrink:0;display:inline-flex;align-items:center;gap:14px;font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;color:#F0E9DF;text-decoration:none;letter-spacing:0.14em;text-transform:uppercase;border:1.5px solid rgba(240,233,223,0.32);padding:18px 40px;\" style-hover=\"border-color:#F0E9DF;background:rgba(240,233,223,0.05);\">\n        Узнать больше ↓\n      <\u002Fa>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ════════════════════════ WHY ════════════════════════ -->\n<section id=\"why\" style=\"background:#EDE8DC;padding:108px 56px 116px;\">\n  <div style=\"max-width:1400px;margin:0 auto;\">\n\n    <div class=\"sec-hdr\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:72px;\">\n      <div style=\"width:36px;height:1px;background:#C4271B;flex-shrink:0;\"><\u002Fdiv>\n      <span style=\"font-family:'Manrope',sans-serif;font-size:11.5px;font-weight:700;color:#C4271B;letter-spacing:0.22em;text-transform:uppercase;\">01 — Контекст<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"g2\">\n      <h2 style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(36px,4.8vw,72px);line-height:1.0;color:#1A1614;text-transform:uppercase;text-wrap:balance;\">\n        Зачем мы здесь собрались?\n      <\u002Fh2>\n      <div>\n        <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(15px,1.2vw,17px);line-height:1.78;color:#3A3430;text-wrap:pretty;margin-bottom:26px;\">\n          Если вы опытный эксперт или консультант, вы наверняка замечали, что привлекать крупных клиентов становится всё дороже, циклы сделок затягиваются, а попытки поднять чек упираются в сопротивление рынка.\n        <\u002Fp>\n        <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(15px,1.2vw,17px);line-height:1.78;color:#3A3430;text-wrap:pretty;\">\n          Это происходит не потому, что у вас плохой продукт или мало опыта. Это прямое следствие кризиса, который развивается на <strong style=\"font-weight:700;color:#1A1614;\">трёх конкретных уровнях<\u002Fstrong>. Мы объединились, чтобы исправить эту цепочку.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ════════════════════════ THREE LEVELS ════════════════════════ -->\n<section id=\"levels\" style=\"background:#F3EEE4;padding:0 56px 120px;\">\n  <div style=\"max-width:1400px;margin:0 auto;\">\n\n    <div class=\"sec-hdr\" style=\"display:flex;align-items:center;gap:14px;padding-top:108px;margin-bottom:80px;\">\n      <div style=\"width:36px;height:1px;background:#C4271B;flex-shrink:0;\"><\u002Fdiv>\n      <span style=\"font-family:'Manrope',sans-serif;font-size:11.5px;font-weight:700;color:#C4271B;letter-spacing:0.22em;text-transform:uppercase;\">02 — Диагностика<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- LEVEL 1 -->\n    <div class=\"lvl-inner-pad\" style=\"border-top:1px solid rgba(26,22,20,0.13);padding:52px 0 60px;\">\n      <div class=\"glvl\">\n        <div>\n          <span class=\"ghost-num\" style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:130px;line-height:0.85;color:#C4271B;opacity:0.14;display:block;user-select:none;\" aria-hidden=\"true\">01<\u002Fspan>\n          <div style=\"margin-top:18px;\">\n            <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#C4271B;letter-spacing:0.22em;text-transform:uppercase;display:block;margin-bottom:7px;\">Уровень первый<\u002Fspan>\n            <h3 style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(24px,2.4vw,36px);color:#1A1614;text-transform:uppercase;line-height:1.1;\">Личность<br>и практика<\u002Fh3>\n            <p style=\"font-family:'Manrope',sans-serif;font-size:12.5px;color:#8A8078;margin-top:8px;line-height:1.5;\">Вы и ваш бизнес<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gps\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;\">\n              <div style=\"width:6px;height:6px;background:#C4271B;border-radius:50%;flex-shrink:0;\"><\u002Fdiv>\n              <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#C4271B;letter-spacing:0.18em;text-transform:uppercase;\">Проблема<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(14px,1.1vw,15px);line-height:1.78;color:#3A3430;text-wrap:pretty;\">\n              Большинство опытных практиков работают как изолированные одиночки. Без обмена ресурсами, без сильного бренда и юридической‑методологической опоры эксперт тащит на себе продажи, маркетинг и исполнение. <strong style=\"font-weight:700;color:#1A1614;\">Итог: стеклянный потолок в доходе, демпинг ради выживания и выгорание.<\u002Fstrong>\n            <\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;\">\n              <div style=\"width:6px;height:6px;background:#1A1614;border-radius:50%;flex-shrink:0;\"><\u002Fdiv>\n              <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#1A1614;letter-spacing:0.18em;text-transform:uppercase;\">Решение<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(14px,1.1vw,15px);line-height:1.78;color:#3A3430;text-wrap:pretty;\">\n              Перестать мыслить локальными задачами. Мы помогаем эксперту выстроить масштабное видение себя как бизнеса и авторитетной личности. Это трансформирует личный бренд, репутацию, финансовые возможности и возвращает искренний драйв к созиданию.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- LEVEL 2 -->\n    <div class=\"lvl-inner-pad\" style=\"border-top:1px solid rgba(26,22,20,0.13);padding:52px 0 60px;\">\n      <div class=\"glvl\">\n        <div>\n          <span class=\"ghost-num\" style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:130px;line-height:0.85;color:#C4271B;opacity:0.14;display:block;user-select:none;\" aria-hidden=\"true\">02<\u002Fspan>\n          <div style=\"margin-top:18px;\">\n            <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#C4271B;letter-spacing:0.22em;text-transform:uppercase;display:block;margin-bottom:7px;\">Уровень второй<\u002Fspan>\n            <h3 style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(24px,2.4vw,36px);color:#1A1614;text-transform:uppercase;line-height:1.1;\">Рынок<br>и сообщество<\u002Fh3>\n            <p style=\"font-family:'Manrope',sans-serif;font-size:12.5px;color:#8A8078;margin-top:8px;line-height:1.5;\">Профессиональная среда<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gps\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;\">\n              <div style=\"width:6px;height:6px;background:#C4271B;border-radius:50%;flex-shrink:0;\"><\u002Fdiv>\n              <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#C4271B;letter-spacing:0.18em;text-transform:uppercase;\">Проблема<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(14px,1.1vw,15px);line-height:1.78;color:#3A3430;text-wrap:pretty;\">\n              Как такового рынка консалтинга в СНГ не существует — есть разрозненная масса экспертов. Из-за отсутствия стандартов качества и профессиональной этики опытные специалисты никак не защищены от демпинга, а среда кажется токсичной и меркантильной.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;\">\n              <div style=\"width:6px;height:6px;background:#1A1614;border-radius:50%;flex-shrink:0;\"><\u002Fdiv>\n              <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#1A1614;letter-spacing:0.18em;text-transform:uppercase;\">Решение<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(14px,1.1vw,15px);line-height:1.78;color:#3A3430;text-wrap:pretty;\">\n              Мы выстраиваем культуру и правила новой Индустрии. Объединяясь, обмениваясь ресурсами, активами и практическим опытом, мы превращаемся из одиночек в движение с твёрдой этикой и взаимным доверием.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- LEVEL 3 -->\n    <div class=\"lvl-inner-pad\" style=\"border-top:1px solid rgba(26,22,20,0.13);padding:52px 0 0;\">\n      <div class=\"glvl\">\n        <div>\n          <span class=\"ghost-num\" style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:130px;line-height:0.85;color:#C4271B;opacity:0.14;display:block;user-select:none;\" aria-hidden=\"true\">03<\u002Fspan>\n          <div style=\"margin-top:18px;\">\n            <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#C4271B;letter-spacing:0.22em;text-transform:uppercase;display:block;margin-bottom:7px;\">Уровень третий<\u002Fspan>\n            <h3 style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(24px,2.4vw,36px);color:#1A1614;text-transform:uppercase;line-height:1.1;\">Бизнес<br>и экономика<\u002Fh3>\n            <p style=\"font-family:'Manrope',sans-serif;font-size:12.5px;color:#8A8078;margin-top:8px;line-height:1.5;\">Предпринимательство и государство<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gps\">\n          <div>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;\">\n              <div style=\"width:6px;height:6px;background:#C4271B;border-radius:50%;flex-shrink:0;\"><\u002Fdiv>\n              <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#C4271B;letter-spacing:0.18em;text-transform:uppercase;\">Проблема<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(14px,1.1vw,15px);line-height:1.78;color:#3A3430;text-wrap:pretty;\">\n              Крупный бизнес и первые лица критически нуждаются в свежем взгляде со стороны. Но из-за хаоса на рынке они тотально не доверяют внешним консультантам — предпочитают терять миллиарды, принимая решения самостоятельно. Из-за этого и вы не получаете контракты высшего уровня.\n            <\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;\">\n              <div style=\"width:6px;height:6px;background:#1A1614;border-radius:50%;flex-shrink:0;\"><\u002Fdiv>\n              <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#1A1614;letter-spacing:0.18em;text-transform:uppercase;\">Решение<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(14px,1.1vw,15px);line-height:1.78;color:#3A3430;text-wrap:pretty;\">\n              Мы строим прямой верифицированный мост между крупным бизнесом и Индустрией. Бренд «Индустрии» и ассоциации станет знаком качества. Бизнес растёт и развивает экономику — вы получаете системный поток долгосрочных контрактов с первыми лицами.\n            <\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ════════════════════════ CAUSAL CHAIN ════════════════════════ -->\n<section id=\"chain\" style=\"background:#181614;padding:108px 56px 116px;position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;inset:0;background-image:linear-gradient(0deg,rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:88px 88px;pointer-events:none;\"><\u002Fdiv>\n\n  <div style=\"max-width:1400px;margin:0 auto;position:relative;z-index:1;\">\n\n    <div class=\"sec-hdr\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:72px;\">\n      <div style=\"width:36px;height:1px;background:#C4271B;flex-shrink:0;\"><\u002Fdiv>\n      <span style=\"font-family:'Manrope',sans-serif;font-size:11.5px;font-weight:700;color:#C4271B;letter-spacing:0.22em;text-transform:uppercase;\">03 — Логика системы<\u002Fspan>\n    <\u002Fdiv>\n\n    <h2 style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(36px,5vw,80px);line-height:1.0;color:#F0E9DF;text-transform:uppercase;text-wrap:balance;margin-bottom:72px;max-width:800px;\">\n      Причинно-следственная связь\n    <\u002Fh2>\n\n    <!-- Step 1 -->\n    <div style=\"border-top:1px solid rgba(240,233,223,0.08);padding:44px 0;\">\n      <div class=\"gchn\">\n        <div>\n          <span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(36px,3.5vw,52px);line-height:1;color:#C4271B;opacity:0.55;display:block;\">ЕСЛИ<\u002Fspan>\n          <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:600;color:#5A5450;letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;display:block;\">Уровень 2 — Рынок<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(15px,1.2vw,17px);line-height:1.75;color:#908880;text-wrap:pretty;padding-top:6px;\">\n          Мы вместе <strong style=\"color:#F0E9DF;font-weight:700;\">не наведём порядок на рынке экспертов<\u002Fstrong> — не создадим единые стандарты качества, понятную репутацию и профессиональную этику всей среды…\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chain-arr\">\n      <span style=\"font-family:'Oswald',sans-serif;font-size:36px;color:#C4271B;opacity:0.35;\">↓<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Step 2 -->\n    <div style=\"border-top:1px solid rgba(240,233,223,0.08);padding:44px 0;\">\n      <div class=\"gchn\">\n        <div>\n          <span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(36px,3.5vw,52px);line-height:1;color:#C4271B;opacity:0.55;display:block;\">ТО<\u002Fspan>\n          <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:600;color:#5A5450;letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;display:block;\">Уровень 3 — Бизнес<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(15px,1.2vw,17px);line-height:1.75;color:#908880;text-wrap:pretty;padding-top:6px;\">\n          Крупный бизнес и первые лица <strong style=\"color:#F0E9DF;font-weight:700;\">никогда не откроют двери внешним экспертам<\u002Fstrong> — они продолжат терять миллиарды, совершая ошибки без сильных советников, замедляя рост экономики, которая сказывается на всех нас…\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"chain-arr\">\n      <span style=\"font-family:'Oswald',sans-serif;font-size:36px;color:#C4271B;opacity:0.35;\">↓<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- Step 3 -->\n    <div style=\"border-top:1px solid rgba(240,233,223,0.08);padding:44px 0;\">\n      <div class=\"gchn\">\n        <div>\n          <span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(36px,3.5vw,52px);line-height:1;color:#C4271B;opacity:0.55;display:block;\">ЗНАЧИТ<\u002Fspan>\n          <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:600;color:#5A5450;letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;display:block;\">Уровень 1 — Вы<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(15px,1.2vw,17px);line-height:1.75;color:#908880;text-wrap:pretty;padding-top:6px;\">\n          Лично вы продолжите <strong style=\"color:#F0E9DF;font-weight:700;\">тратить огромные силы на поиск клиентов в мелких сегментах<\u002Fstrong> и биться за копейки — вне зависимости от вашего опыта и экспертизы.\n        <\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Conclusion -->\n    <div style=\"border-top:1px solid rgba(240,233,223,0.08);padding-top:56px;margin-top:8px;\">\n      <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(17px,1.4vw,20px);line-height:1.7;color:#F0E9DF;text-wrap:pretty;max-width:800px;\">\n        Мы здесь, чтобы починить всю систему целиком. <strong style=\"color:#C4271B;\">Но поодиночке это сделать невозможно.<\u002Fstrong>\n      <\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ════════════════════════ BUILDING ════════════════════════ -->\n<section id=\"building\" style=\"background:#EDE8DC;padding:108px 56px 120px;\">\n  <div style=\"max-width:1400px;margin:0 auto;\">\n\n    <div class=\"sec-hdr\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:72px;\">\n      <div style=\"width:36px;height:1px;background:#C4271B;flex-shrink:0;\"><\u002Fdiv>\n      <span style=\"font-family:'Manrope',sans-serif;font-size:11.5px;font-weight:700;color:#C4271B;letter-spacing:0.22em;text-transform:uppercase;\">04 — Что мы строим<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"g2 g2-mb\" style=\"margin-bottom:80px;\">\n      <h2 style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(32px,4.5vw,68px);line-height:1.0;color:#1A1614;text-transform:uppercase;text-wrap:balance;\">\n        Что мы строим вместе прямо сейчас\n      <\u002Fh2>\n      <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(15px,1.2vw,17px);line-height:1.78;color:#3A3430;text-wrap:pretty;padding-top:6px;\">\n        Сейчас мы объединяем первые <strong style=\"font-weight:700;color:#1A1614;\">100 профессионалов<\u002Fstrong> для опыления единым контекстом, взаимной поддержки, обмена практическим опытом и выстраивания партнёрских отношений.\n      <\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Milestones -->\n    <div class=\"gmil\">\n\n      <div class=\"mi\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:22px;\">\n          <div style=\"width:8px;height:8px;background:#C4271B;border-radius:50%;flex-shrink:0;\"><\u002Fdiv>\n          <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#C4271B;letter-spacing:0.16em;text-transform:uppercase;\">Сейчас<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:60px;line-height:1;color:#1A1614;margin-bottom:12px;\">100<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;color:#1A1614;margin-bottom:8px;line-height:1.4;\">Первых профессионалов<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:13px;line-height:1.65;color:#6A6260;\">Фаундеры, закладывающие стандарты и культуру среды<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mi\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:22px;\">\n          <div style=\"width:8px;height:8px;border:2px solid rgba(26,22,20,0.22);border-radius:50%;flex-shrink:0;\"><\u002Fdiv>\n          <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#8A8078;letter-spacing:0.16em;text-transform:uppercase;\">Следующий этап<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:60px;line-height:1;color:#1A1614;margin-bottom:12px;\">1 000<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;color:#1A1614;margin-bottom:8px;line-height:1.4;\">Профессионалов по городам<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:13px;line-height:1.65;color:#6A6260;\">Масштабирование сети по ключевым городам России и СНГ<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mi\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:22px;\">\n          <div style=\"width:8px;height:8px;border:2px solid rgba(26,22,20,0.18);border-radius:50%;flex-shrink:0;\"><\u002Fdiv>\n          <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#8A8078;letter-spacing:0.16em;text-transform:uppercase;\">В планах<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:44px;line-height:1.05;color:#1A1614;margin-bottom:12px;\">НКО<br>Ассоциация<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;color:#1A1614;margin-bottom:8px;line-height:1.4;\">Государственная структура<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:13px;line-height:1.65;color:#6A6260;\">Официальная ассоциация с государственным признанием<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mi\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:22px;\">\n          <div style=\"width:8px;height:8px;border:2px solid rgba(26,22,20,0.18);border-radius:50%;flex-shrink:0;\"><\u002Fdiv>\n          <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#8A8078;letter-spacing:0.16em;text-transform:uppercase;\">В планах<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:44px;line-height:1.05;color:#1A1614;margin-bottom:12px;\">Конференции<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;color:#1A1614;margin-bottom:8px;line-height:1.4;\">Профильные события<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:13px;line-height:1.65;color:#6A6260;\">Отраслевые мероприятия для формирования рынка<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mi\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:22px;\">\n          <div style=\"width:8px;height:8px;border:2px solid rgba(26,22,20,0.18);border-radius:50%;flex-shrink:0;\"><\u002Fdiv>\n          <span style=\"font-family:'Manrope',sans-serif;font-size:10.5px;font-weight:700;color:#8A8078;letter-spacing:0.16em;text-transform:uppercase;\">В планах<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:44px;line-height:1.05;color:#1A1614;margin-bottom:12px;\">ТОП‑100<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;color:#1A1614;margin-bottom:8px;line-height:1.4;\">Лучших советников России<\u002Fdiv>\n        <div style=\"font-family:'Manrope',sans-serif;font-size:13px;line-height:1.65;color:#6A6260;\">Официальный рейтинг и знак качества для рынка<\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ════════════════════════ THE RULE ════════════════════════ -->\n<section id=\"rule\" style=\"background:#181614;padding:108px 56px 120px;position:relative;overflow:hidden;\">\n  <div style=\"position:absolute;inset:0;background-image:linear-gradient(0deg,rgba(255,255,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.022) 1px,transparent 1px);background-size:88px 88px;pointer-events:none;\"><\u002Fdiv>\n\n  <div style=\"max-width:1400px;margin:0 auto;position:relative;z-index:1;\">\n\n    <div class=\"sec-hdr\" style=\"display:flex;align-items:center;gap:14px;margin-bottom:80px;\">\n      <div style=\"width:36px;height:1px;background:#C4271B;flex-shrink:0;\"><\u002Fdiv>\n      <span style=\"font-family:'Manrope',sans-serif;font-size:11.5px;font-weight:700;color:#C4271B;letter-spacing:0.22em;text-transform:uppercase;\">05 — Главное правило<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"g2\">\n\n      <div>\n        <h2 style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(56px,8vw,132px);line-height:0.88;color:#F0E9DF;text-transform:uppercase;text-wrap:balance;\">\n          Равное<br>поле\n        <\u002Fh2>\n        <div style=\"width:72px;height:3px;background:#C4271B;margin-top:44px;\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div>\n        <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(15px,1.3vw,18px);line-height:1.78;color:#908880;text-wrap:pretty;margin-bottom:32px;\">\n          «Индустрия» — это равное поле. У нас категорически запрещено продавать друг другу, спамить или использовать коллег в меркантильных целях.\n        <\u002Fp>\n\n        <div style=\"background:rgba(196,39,27,0.09);border-left:3px solid #C4271B;padding:22px 26px;margin-bottom:32px;\">\n          <p style=\"font-family:'Manrope',sans-serif;font-size:15.5px;line-height:1.65;color:#F0E9DF;font-weight:600;\">\n            За нарушение этого правила — мгновенное исключение из всех проектов экосистемы.\n          <\u002Fp>\n        <\u002Fdiv>\n\n        <p style=\"font-family:'Manrope',sans-serif;font-size:clamp(15px,1.2vw,17px);line-height:1.78;color:#908880;text-wrap:pretty;margin-bottom:56px;\">\n          Это безопасная среда для реализации вашего потенциала, обмена опытом и создания совместных бизнес-коллабораций.\n        <\u002Fp>\n\n        <div style=\"border-top:1px solid rgba(240,233,223,0.09);padding-top:44px;\">\n          <p style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:clamp(20px,2vw,26px);line-height:1.2;color:#F0E9DF;text-transform:uppercase;margin-bottom:8px;\">\n            Добро пожаловать в среду.\n          <\u002Fp>\n          <p style=\"font-family:'Manrope',sans-serif;font-size:15.5px;color:#6A6260;margin-bottom:44px;\">\n            Рады, что вы с нами с истоков.\n          <\u002Fp>\n          <a href=\"#\" style=\"display:inline-flex;align-items:center;gap:16px;font-family:'Manrope',sans-serif;font-size:12.5px;font-weight:700;color:#181614;text-decoration:none;letter-spacing:0.14em;text-transform:uppercase;background:#F0E9DF;padding:22px 52px;\" style-hover=\"background:#C4271B;color:#F0E9DF;\">\n            Вступить в Индустрию →\n          <\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ════════════════════════ FOOTER ════════════════════════ -->\n<footer style=\"background:#100E0D;padding:44px 56px;border-top:1px solid rgba(255,255,255,0.04);\">\n  <div style=\"max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;\">\n    <div style=\"display:flex;align-items:center;gap:12px;\">\n      <div style=\"display:flex;align-items:flex-end;gap:3px;height:18px;\">\n        <div style=\"width:3px;height:9px;background:#C4271B;\"><\u002Fdiv>\n        <div style=\"width:3px;height:13px;background:#C4271B;\"><\u002Fdiv>\n        <div style=\"width:3px;height:18px;background:#C4271B;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.2em;color:rgba(240,233,223,0.4);text-transform:uppercase;\">Индустрия<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-family:'Manrope',sans-serif;font-size:12px;color:#3A3430;letter-spacing:0.05em;\">\n      © 2026 Индустрия профессионального консалтинга\n    <\u002Fp>\n  <\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1440}}\">\nclass Component extends DCLogic {}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
